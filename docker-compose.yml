name: safety-platform

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-safety-platform}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-safety_platform}
      MYSQL_USER: ${MYSQL_USER:-safety_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-safety_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-safety_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - safety_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-safety-platform}-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-safety_platform}
      DB_USER: ${MYSQL_USER:-safety_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-safety_password}
      JWT_SECRET: ${JWT_SECRET:-safety_platform_local_secret}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - safety_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-safety-platform}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  safety_mysql_data:
  safety_uploads:
